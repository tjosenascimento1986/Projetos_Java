<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkControl - Sistema de Estacionamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root { --primary-color: #2c3e50; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--primary-color); }
        .stat-card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .btn-entry { border-radius: 8px; padding: 12px; font-weight: 600; }
        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-p-square-fill me-2 fs-3 text-warning"></i>
                <span>Park<strong>Control</strong></span>
            </a>
            <div class="text-white d-none d-md-block">
                <small id="current-date"></small>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card stat-card bg-primary text-white p-3">
                    <small>Vagas Totais</small>
                    <h3 class="fw-bold">50</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card bg-success text-white p-3">
                    <small>Disponíveis</small>
                    <h3 class="fw-bold" th:text="${vagasLivres}">32</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card bg-danger text-white p-3">
                    <small>Ocupadas</small>
                    <h3 class="fw-bold" th:text="${vagasOcupadas}">18</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card bg-warning text-dark p-3">
                    <small>Hoje (R$)</small>
                    <h3 class="fw-bold">450,00</h3>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <h5 class="card-title mb-3"><i class="bi bi-plus-circle me-2"></i>Nova Entrada</h5>
                <form class="row g-3 align-items-end">
                    <div class="col-12 col-md-4">
                        <label class="form-label small text-muted text-uppercase fw-bold">Placa do Veículo</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" placeholder="ABC-1234" required>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label small text-muted text-uppercase fw-bold">Tipo</label>
                        <select class="form-select form-select-lg bg-light border-0">
                            <option value="CARRO">Carro</option>
                            <option value="MOTO">Moto</option>
                            <option value="CAMINHONETE">Caminhonete</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-5">
                        <button type="submit" class="btn btn-primary btn-lg w-100 btn-entry">
                            REGISTRAR ENTRADA
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="table-container mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0">Veículos no Pátio</h5>
                <input type="text" class="form-control w-auto d-none d-sm-block" placeholder="Buscar placa...">
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Placa</th>
                            <th>Tipo</th>
                            <th>Entrada</th>
                            <th class="text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="badge bg-dark fs-6">ABC-1234</span></td>
                            <td><i class="bi bi-car-front me-1"></i> Carro</td>
                            <td>14:30</td>
                            <td class="text-end">
                                <button class="btn btn-outline-danger btn-sm">
                                    Finalizar <i class="bi bi-box-arrow-right ms-1"></i>
                                </button>
                            </td>
                        </tr>
                        <tr>
                            <td><span class="badge bg-dark fs-6">XYZ-9876</span></td>
                            <td><i class="bi bi-bicycle me-1"></i> Moto</td>
                            <td>15:12</td>
                            <td class="text-end">
                                <button class="btn btn-outline-danger btn-sm">
                                    Finalizar <i class="bi bi-box-arrow-right ms-1"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Exibe a data atual formatada
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', options);
    </script>
</body>
</html>
